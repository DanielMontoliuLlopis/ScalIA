server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con cache largo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
