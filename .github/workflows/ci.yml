name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile all sources
        run: python -m compileall -q app

      - name: Assert a single Alembic head
        run: |
          heads=$(alembic heads 2>/dev/null | grep -c "(head)")
          echo "Alembic heads found: $heads"
          if [ "$heads" -ne 1 ]; then
            echo "::error::Expected exactly 1 Alembic head, found $heads. Run 'alembic merge' to resolve."
            alembic heads
            exit 1
          fi
